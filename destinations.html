<!-- Destination CRUD Form -->

<section class="crud-section">

    <h2>Destination Manager</h2>

    <form id="destinationForm">

        <input
            type="text"
            id="name"
            placeholder="Destination Name"
            required
        >
        <textarea id="description"
            placeholder="Destination Description"
            required></textarea>

        <input
            type="text"
            id="location"
            placeholder="Location"
            required
        >

        <input
            type="number"
            id="price"
            placeholder="Price"
            required
        >

        <input
            type="text"
            id="duration"
            placeholder="Duration"
            required
        >

        <input
            type="url"
            id="image"
            placeholder="Image URL"
            required
        >

        <button type="submit" id="submitBtn">
            Add Destination
        </button>

    </form>

</section>

<h1 class="page-title">Popular Destinations</h1>

<div class="cards" id="destinationCards">

</div>

<script src="destination.js"></script>
